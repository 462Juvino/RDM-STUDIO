<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Host - RDM Studio</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7445704187291505" crossorigin="anonymous"></script>
</head>
<body class="theme-painel">
    <header style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--destaque);">
        <a href="index.html" class="btn-voltar">⬅ VOLTAR</a>
        <img src="imagens/logo.png" alt="RDM Studio" style="height: 40px;">
    </header>

    <main style="text-align: center;">
        <img src="imagens/host.png" alt="Logo Painel Host" style="max-width: 250px; border-radius: 25px; margin: 20px auto; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.6);">
        <h1 style="margin-bottom: 40px;">PAINEL HOST + NARRADOR</h1>

        <section style="background: var(--card-bg); padding: 30px; border-radius: 15px; text-align: left; margin-bottom: 40px;">
            <h2 style="margin-top: 0;">CONTROLE TOTAL DA SUA LIVE</h2>
            <p>A ferramenta definitiva para gerenciamento de eventos. Automatize narrações, integre alertas e tenha o controle absoluto da sua transmissão em um só lugar.</p>
        </section>

        <section style="text-align: left;">
            <h2>📺 TUTORIAL DA FERRAMENTA</h2>
            <div style="background: #000; border-radius: 15px; height: 500px; display: flex; align-items: center; justify-content: center; margin-top: 20px; border: 2px solid var(--card-bg); color: var(--text-sec);">
                <iframe width="100%" height="500" src="https://www.youtube.com/embed/n-9Bt6wrgUw?si=oHDXiKGBrwdkN1oY" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <div id="game-access-area" style="margin-top: 30px;">
            <button class="btn-download" style="background: #64748b; cursor: not-allowed;">Verificando Licença...</button>
        </div>
    </main>
    <footer>&copy; 2026 RDM Studio.</footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const logado = localStorage.getItem("rdm_user");
            const perfil = localStorage.getItem("rdm_perfil");
            const accessArea = document.getElementById("game-access-area");
            const linkDownload = "https://drive.google.com/file/d/1P-V-q_Vr8-oACCWFJbHOvpJ8QQIWq8Bp/view?usp=drive_link";

            if (!logado) {
                accessArea.innerHTML = `<button onclick="alert('Volte para a página inicial e faça login para acessar!')" class="btn-download" style="background: #ef4444; color: white;">🔒 FAÇA LOGIN PARA BAIXAR</button>`;
                return;
            }

            // Libera apenas para os 3 planos superiores
            if (perfil === "plus premium" || perfil === "pro" || perfil === "adm") {
                accessArea.innerHTML = `<a href="${linkDownload}" target="_blank" class="btn-download" style="background: #22c55e; color: black; font-weight: bold;">⬇ BAIXAR PAINEL HOST</a>`;
            } else {
                accessArea.innerHTML = `<button onclick="alert('Ferramenta exclusiva para planos PLUS PREMIUM e PRO! Adquira um plano superior para ter acesso.')" class="btn-download" style="background: #64748b; color: white; cursor: not-allowed;">🔒 EXCLUSIVO PARA PLUS PREMIUM OU SUPERIOR</button>`;
            }
        });
    </script>
</body>
</html>
