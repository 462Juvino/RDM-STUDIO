<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainBom - RDM Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-portifolio" style="--bg-color: #1e1b4b; --card-bg: #312e81; --destaque: #a855f7; --hover-destaque: #9333ea;">
    <header style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--destaque);">
        <a href="index.html" class="btn-voltar">⬅ VOLTAR</a>
        <img src="imagens/logo.png" alt="RDM Studio" style="height: 40px;">
    </header>

    <main style="text-align: center;">
        <img src="imagens/brain.png" alt="Logo BrainBom" style="max-width: 250px; border-radius: 25px; margin: 20px auto; display: block; box-shadow: 0 10px 30px rgba(0,0,0,0.6);">
        <h1 style="margin-bottom: 40px;">BRAINBOM & ANAGRAMA</h1>

        <section style="background: var(--card-bg); padding: 30px; border-radius: 15px; text-align: left; margin-bottom: 40px;">
            <h2 style="margin-top: 0;">DESAFIO MENTAL</h2>
            <p>Teste sua lógica e vocabulário! Desarme a bomba pensando rápido ou descubra as palavras ocultas no Anagrama.</p>
        </section>

        <section style="text-align: left;">
            <h2>📺 SHORTS GAMEPLAY</h2>
            <div style="background: #000; border-radius: 15px; overflow: hidden; margin-top: 20px; border: 2px solid var(--card-bg); display: flex; justify-content: center;">
                <iframe width="315" height="560" src="https://www.youtube.com/embed/UakCuFWxFwY" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <a href="https://drive.google.com/file/d/1OgkziKqEXVsVHAJv7Tl-7pfgKpiVtPyv/view?usp=sharing" class="btn-download">⬇ BAIXAR BRAINBOM</a>
    </main>
    <footer>&copy; 2026 RDM Studio.</footer>
